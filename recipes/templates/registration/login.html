{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4 py-12">
    <div
        class="max-w-md w-full bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden glassmorphism border border-gray-100 dark:border-gray-700 p-8">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Welcome Back</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Sign in to your account and discover new recipes</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            {% if form.errors %}
            <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-md text-sm text-center">
                Your username and password didn't match. Please try again.
            </div>
            {% endif %}

            <div>
                <label for="id_username"
                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username"
                    maxlength="150" required id="id_username"
                    class="w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-brand-cinnabar focus:ring-brand-cinnabar py-3 px-4 border">
            </div>

            <div>
                <label for="id_password"
                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" name="password" autocomplete="current-password" required id="id_password"
                    class="w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-brand-cinnabar focus:ring-brand-cinnabar py-3 px-4 border">
            </div>

            <button type="submit"
                class="w-full bg-brand-cinnabar hover:bg-red-600 text-white font-bold py-3 px-4 rounded-md shadow-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-cinnabar mt-2">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <p class="text-gray-600 dark:text-gray-400">
                Don't have an account? <a href="{% url 'recipes:register' %}"
                    class="text-brand-cinnabar hover:underline font-medium">Sign up here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
