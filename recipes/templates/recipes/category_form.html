{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-12">
    <div
        class="bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden glassmorphism border border-gray-100 dark:border-gray-700">

        <div class="bg-brand-cinnabar px-8 py-6 text-white text-center">
            <h1 class="text-3xl font-bold">Add New Category</h1>
            <p class="text-brand-cream/80 mt-2">Create a new category to organize recipes</p>
        </div>

        <div class="p-8">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-md text-sm">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <div>
                    <label for="{{ form.name.id_for_label }}"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category Name</label>
                    {{ form.name }}
                    {% if form.name.errors %}
                    <p class="mt-1 text-sm text-red-600">{{ form.name.errors.0 }}</p>
                    {% endif %}
                </div>

                <div class="pt-4 flex items-center justify-end gap-4 border-t border-gray-200 dark:border-gray-700">
                    <a href="{% url 'recipes:recipe_create' %}"
                        class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white font-medium px-4 py-2">
                        Cancel
                    </a>
                    <button type="submit"
                        class="bg-brand-cinnabar hover:bg-red-600 text-white font-bold py-2 px-8 rounded-md shadow-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-cinnabar">
                        Save Category
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
