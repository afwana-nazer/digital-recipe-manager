{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4">
    <div
        class="max-w-md w-full bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden glassmorphism text-center p-8 border border-red-100 dark:border-red-900/30">

        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 dark:bg-red-900/50 mb-6">
            <i class="fa-solid fa-triangle-exclamation text-brand-cinnabar text-2xl"></i>
        </div>

        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Delete Recipe?</h2>
        <p class="text-gray-600 dark:text-gray-300 mb-8">
            Are you sure you want to delete <strong>"{{ object.title }}"</strong>? This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'recipes:recipe_detail' object.pk %}"
                    class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 font-medium py-3 px-6 rounded-md transition-colors">
                    Cancel Keep Recipe
                </a>
                <button type="submit"
                    class="bg-brand-cinnabar hover:bg-red-600 text-white font-medium py-3 px-6 rounded-md shadow-md transition-colors">
                    Yes, Delete Recipe
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
